name: Unit tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  phpunit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write       # dorny/test-reporter publishes a check run with per-test results
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: dom, mbstring, libxml
          coverage: none
          tools: composer

      - name: Install dependencies
        working-directory: tests/unit
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run unit tests
        working-directory: tests/unit
        run: |
          echo '## Unit test results' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          vendor/bin/phpunit --testdox --colors=never --log-junit junit.xml | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo '----- junit.xml (debug) -----'
          head -c 1500 junit.xml; echo

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: success() || failure()   # report even when tests fail (but not on cancel)
        with:
          name: PHPUnit results
          path: tests/unit/junit.xml
          reporter: java-junit
